services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # Инициируем single-node replica set при первом старте, затем проверяем готовность.
      test: >
        mongosh --quiet --eval "try { rs.status().ok } catch (e) {
        rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}).ok }"
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 5s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Secrets (JWT_SECRET, ...) come from a host .env in prod; optional in dev.
    env_file:
      - path: .env
        required: false
    # Container-network values override anything from .env (env_file < environment).
    environment:
      MONGO_URI: mongodb://mongo:27017/?directConnection=true
      MONGO_DB: forms
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
